<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CART</title>
    <link rel="stylesheet" href="./index.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    <div id="box">
        <div id="left">
            <div id="leftBox">
                <div>
                     <input id="ascending" name="sort" type="radio">
                    <label for="ascending"> Ascending price</label>
                </div>
                <div>
                    <input id="descending" name="sort" type="radio">
                   <label for="descending"> Descending price</label>
               </div>
               <div>
                <label>Adjust Rating</label>
                <input id="range" type="range" min="1" max="5" step="0.5" >
               </div>
               
               <button id="addNew"> + Add New Product</button>
                
            </div>
        </div>
        <div id="right">
            <div id="search">
                <input id="searchText" type="text" placeholder="Enter product name " >
            </div>
            <div id="items">
               

            </div>
            <!-- <div id="page">
                <div id="innerPage">
                    <i id="prevPage" class='bx bx-chevron-left-circle' ></i>
                    <i  id="nextPage" class='bx bx-chevron-right-circle' ></i>
              </div>
            </div> -->

            
                

            
        </div>
    </div>
    <div id="black"></div>
    <div class="loader"></div>
    <form id="newProduct">
        <input id="imageLink" placeholder="Enter Product Image Link" required>
        <input id="title" placeholder="Enter Product Title" type="text" required>
        <input id="description"  placeholder="Enter Prodcut Description" type="text" required>
        <input id="price"  placeholder="Enter Product Price" type="number" required>
        <input id="rating"  placeholder="Enter Product Rating" type="number"  step="0.01"  required>
        <div>
            <button type="submit" id="ADD">ADD</button>
            <button id="CANCEL">CANCEL</button>
        </div>
    </form>
    <form id="editProduct">
        <input id="eimageLink" placeholder="Enter Product Image Link" required>
        <input id="etitle" placeholder="Enter Product Title" type="text" required>
        <input id="edescription"  placeholder="Enter Prodcut Description" type="text" required>
        <input id="eprice"  placeholder="Enter Product Price" type="number" required>
        <input id="erating"  placeholder="Enter Product Rating" type="number" step="0.01" required>
        <div>
            <button type="submit" id="EDIT" value="ADD">ADD</button>
            <button type="button" id="CANCELEDIT" value="CANCEL">CANCEL</button>
        </div>
    </form>
    <script src="./index.js"></script>
</body>
</html>
