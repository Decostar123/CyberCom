<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index18</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h3{
            margin-top: 20px ;
        }
        button{
            margin-top:10px ;
        }
    </style>
</head>
<body>
    <div id="box">
        <h3 > Inserting text Node </h3>
        

        
        
    </div>
    <button>Inserting textNode </button>
    <script>
         
        let count = 1; 
        document.querySelector("button").addEventListener( 'click' , ()=>{
           const node = document.createTextNode(`This is ${count} child `)  ; 
           document.querySelector("#box").append(node) ; 

        })
        
    </script>
</body>
</html>
