<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index2</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h3{
            margin-top: 20px ;
        }
        button{
            margin-top:10px ;
        }
    </style>
</head>
<body>
    <div id="box">
        <h3 class="title">getElementByClassName example</h3>
        <h3 class="title">h3 tag to show getElemntByClassName</h3>
    </div>
    <button>Change the text Content </button>
    <script>
        let toggle = true ; 
        document.querySelector("button").addEventListener( 'click' , ()=>{
            const element = document.getElementsByClassName("title"); 
            // alert( element.textContent ) ; 
            element[0].textContent= toggle? "get ElementByClassName returns array of matching element " : "getElementByClassName example"
            toggle = !toggle ;
        })
        
    </script>
</body>
</html>
