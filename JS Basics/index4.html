<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index4</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h3{
            margin-top: 20px ;
        }
        button{
            margin-top:10px ;
        }
    </style>
</head>
<body>
    <div id="box">
        <h3>querySelector  example</h3>
    </div>
    <button>Change the text Content </button>
    <script>
        let toggle = true ; 
        document.querySelector("button").addEventListener( 'click' , ()=>{
            const element = document.querySelector("h3") ; 
            // alert( element.textContent ) ; 
            element.textContent= toggle? "querySelector By default return first maching element " : "query Selector  example"
            toggle = !toggle ;
        })
        
    </script>
</body>
</html>
