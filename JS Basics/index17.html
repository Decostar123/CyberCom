<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index17</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h3{
            margin-top: 20px ;
        }
        button{
            margin-top:10px ;
        }
    </style>
</head>
<body>
    <div id="box">
        <h3 > Child Node 1 </h3>
        <h3 > Child Node 2 </h3>
        <h3 > Child Node 3 </h3>
        <h3 > Child Node 4 </h3>
        <h3 > Child Node 5 </h3>
        <h3 > Child Node 6 </h3>
        <h3 > Child Node 7 </h3>
        <h3 > Child Node 8 </h3>

        
        
    </div>
    <button>Remove Last Child by remove method </button>
    <script>
         
        
        document.querySelector("button").addEventListener( 'click' , ()=>{
           const list = document.querySelectorAll("h3") ; 
            list[list.length-1].remove() ; 

        })
        
    </script>
</body>
</html>
