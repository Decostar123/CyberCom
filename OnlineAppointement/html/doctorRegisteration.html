<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoctorRegisteration</title>
    <link rel="stylesheet" href="../css/registeration.css">
</head>
<body>
    <div id="container">

        <form class="login">
            <input type="text"  name="userName" id="userName" placeholder="Name" required>
            <input type="email"  name="email" id="email" placeholder="Email" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <input type="text" name="expertise" id="expertise" placeholder="Expertise" >
            <input type="number" name="experience" id="experience" placeholder="Experience in Years" >
            
            
            <button type="submit" id="register">REGISTER </button> 
    
    
    
    
    
        </form>

    </div>
    
    <script src="../js/doctorRegisteration.js">  </script>
    
</body>
</html>
