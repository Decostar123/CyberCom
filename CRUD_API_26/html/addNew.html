<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddNewProduct</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <form id="newProduct">
        <input id="imageLink" placeholder="Enter Product Image Link" required>
        <input id="title" placeholder="Enter Product Title" type="text" required>
        <input id="description"  placeholder="Enter Prodcut Description" type="text" required>
        <input id="price"  placeholder="Enter Product Price" type="number" required>
        <!-- <input id="rating"  placeholder="Enter Product Category" type="number"    required> -->
        <select id="rating" name="rating">
            <option value="Shoes">Shoes</option>
            <option value="Clothes">Clothes</option>
            <option value="Books">Books</option>
            <option value="Bags">Bags</option>
            <option value="Stationary">Stationary</option>
            <option value="Electronics">Electronics</option>
            <option value="Others">Others</option>
        </select>
        <div>
            <button type="submit" id="ADD">ADD</button>
            <button id="CANCEL">BACK</button>
        </div>
    </form>

    <script src="../js/addNew.js"></script>
</body>
</html>
