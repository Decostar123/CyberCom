<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddNewProduct</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <form id="newProduct">
        <input id="imageLink" placeholder="Enter Product Image Link" required>
        <input id="title" placeholder="Enter Product Title" type="text" required>
        <input id="description"  placeholder="Enter Prodcut Description" type="text" required>
        <input id="price"  placeholder="Enter Product Price" type="number" required>
        <input id="rating"  placeholder="Enter Product Category" type="number"    required>
        <div>
            <button type="submit" id="ADD">ADD</button>
            <button id="CANCEL">BACK</button>
        </div>
    </form>

    <script src="../js/addNew.js"></script>
</body>
</html>
