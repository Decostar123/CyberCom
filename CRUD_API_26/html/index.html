<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CART</title>
    <link rel="stylesheet" href="../css/index.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    <div id="box">
        <div id="left">
            <div id="leftBox">
                <div>
                     <input id="ascending" name="sort" type="radio">
                    <label for="ascending"> Ascending price</label>
                </div>
                <div>
                    <input id="descending" name="sort" type="radio">
                   <label for="descending"> Descending price</label>
               </div>
               <div>
                <label>Adjust Rating</label>
                <input id="range" type="range" min="1" max="5" step="0.5" >
               </div>
               
               <button id="addNew"> + Add New Product</button>

               <button id="editProductID"> Edit Product</button>
                
            </div>
        </div>
        <div id="right">
            <div id="search">
                <input id="searchText" type="text" placeholder="Enter product name " >
               
            </div>
            <div id="items">
               

            </div>
            <!-- <div id="page">
                <div id="innerPage">
                    <i id="prevPage" class='bx bx-chevron-left-circle' ></i>
                    <i  id="nextPage" class='bx bx-chevron-right-circle' ></i>
              </div>
            </div> -->

            
                

            
        </div>
    </div>
    <div id="black"></div>
    <div class="loader"></div>
   
   
    <script src="../js/index.js"></script>
</body>
</html>
