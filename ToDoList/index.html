<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="box">
        <div id="main">
            <p id="title">TODO List</p>
        </div>
        <div id="content">
            <div id="container1">
                <input required id="input1" placeholder="What would you like to add ?"  >
               <div id="dueDate">
                <input required id="input2" type="number" placeholder="Enter poirity number." >
                <input required id="input3" placeholder="Select DUe Date"
                type="text"
                onfocus="(this.type='date')"
                onblur="(this.type='text')"
                 
                >
               </div>
                <button id="add"> ADD </button>
            </div>
            <div id="container2">
                
                <div id="task">
                    <div id="taskHeading">
                        <p class="list">Tasks</p>
                        
                        <p class="priority">Priority</p>
                        <p class="endDate">Due Date</p>
                        <p class="status">Edit</p>
                        <p class="close">Delete</p>
                    </div>  
                    <div id="taskBody">
                      
                       
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    <script src="./script.js">   </script>
    
</body>
</html>
