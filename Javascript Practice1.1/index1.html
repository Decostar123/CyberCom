<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box p{
        min-height:200px ; 
        border : 2px solid black ;
        width : 50% ; 
        text-wrap: wrap;
        
        }
        textarea{
            width : 40% ; 
            border : 2px solid black ;
        }
        button{
            width:150px ; 
            height:50px ; 
            background-color: black;
            color: white;
            border-radius: 12px  ;
            font-size:20px ; 
        }
        button:active{
            translate:0 10px ; 
        }
    </style>
</head>
<body>
    <div id="box">
        <p>

        </p>
        <button> Change text </button>
    </div>
    <div id="change">
        <p>
            Type the text to replace 
        </p>
        <textarea name="" id="" cols="30" rows="10">

        </textarea>
    </div>
    <script>
        document.querySelector("button").addEventListener( 'click' , ()=>{
            const val = document.querySelector("textarea").value ; 
            // console.log( val) ;
            document.querySelector("#box p").textContent  = val ; 
        })
    </script>
    
    
</body>
</html>
