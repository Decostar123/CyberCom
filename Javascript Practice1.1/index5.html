<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color:rgb(228, 78, 41) ;
            color : white ; 
            width : 30% ; 
            height : 40px ; 
            font-size: 15px; 
            border:0;
            margin-top:10px  ;
            border-radius: 12px ;
        }
        .imgContainer{
            width : 30% ; 
            height : fit-content;
            border:2px solid gray;
            border-radius: 10px ;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        img{
            width:100% ; 
            height : 300px ; 

        }
        #box2{
            display:flex ; 
            flex-wrap: wrap; 
            gap:20px ; 
        }
        #url{
            height : 30px  ; 
            width  : 60% ; 
            border : 2px solid black;
            border-radius: 10px ; ;
        }
        #box1{
            display : flex; 
            justify-content: center;
            margin-bottom:10px;
        }
    </style>
</head>

<body>
    <div id="box1">
        <input type="text" id="url" >

    </div>
    <div id="box2">
        <div class="imgContainer" id="img1">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmzD8CJ7p60Tih7JbOLp-MRe7pm05ZMuVM3P2RodwMTg&s  " alt="image" >
                <br>

        </div>

        <div class="imgContainer" id="img6">

        </div>
    </div>

        document.querySelector("#btn1").addEventListener('click' , ()=>{
            const val = document.querySelector("#url").value ;

            document.querySelector("#img1 img").src = val ; 
        })
        document.querySelector("#btn2").addEventListener('click' , ()=>{

</html>
