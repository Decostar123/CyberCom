<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        .login{
            display: flex ; 
            flex-direction: column ;
            gap:20px ; 
            width:500px;
            height:fit-content;
            position:absolute;
            top:0; right:0 ; left:0 ; bottom: 0; 
            margin:auto; 
            padding:20px  ; 
            border:2px solid black;
        }
        input{
            height: 30px ;
            padding:5px ; 

        }
        button{
            height : 40px ; 
            padding:5px ; 
        }
        #or{
            text-align : center ;
        }
    </style>
</head>
<body>
    <form class="login">
        <input type="email"  name="mail" id="mail" placeholder="Email">
        <input type="text" name="pass" id="pass" placeholder="Password">
        <button id="login">LOGIN</button>
        <p id="or">OR</p>
        <button id="register">REGISTER NOW</button> 



    </form>
    <script>
        document.querySelector("#register").addEventListener( 'click' ,()=> {
            alert("clicked"); 
            window.location="Registeration.html" ; 
            window.open("http://127.0.0.1:5500/Task/Registeration.html" , "_blank")
        })
        document.addEventListener('DOMContentLoaded', () => { 
        let adminEntry = localStorage.getItem("adminDetails") ; 
        // userName: "Deco3", mail: "", pass: "", confirmPass: "", city: "", state: ""}
    //    adminEntry = JSON.parse(adminEntry) ;
    //     document.querySelector("#adminName").textContent = adminEntry.userName ;
            if( adminEntry ){
                document.querySelector("#register").style.display = "none"
                document.querySelector("#or").style.display = "none"
            }else{
                document.querySelector("#register").style.display = "block"; 
                document.querySelector("#register").style.display = "block";
                return ;  
            }
            
    } )
    document.querySelector("#login").addEventListener( 'click' ,()=> {
            // alert("clicked");
            const email  = document.querySelector("#mail").password ; 
            const pass = document.querySelector("#pass").value ; 
            
            let adminObj = localStorage.getItem("adminDetails") ; 
            adminObj  = JSON.parse( adminObj) ; 
            if( adminObj.email=== email && adminObj.pass === pass ){
                alert("done");
                // window.location="http://127.0.0.1:5500/Task/Dashbord.html" ; 
            window.open("http://127.0.0.1:5500/Task/Dashbord.html" , "_blank")
            }else{
                alert("Invalid Credentials")
            }
            
        })
    </script>
</body>
</html>
