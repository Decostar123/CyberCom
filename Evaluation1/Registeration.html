<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration</title>
    <style>
        .login{
            display: flex ; 
            
            flex-direction: column ;
            gap:20px ; 
            width:500px;
            height:fit-content;
            position:absolute;
            top:0; right:0 ; left:0 ; bottom: 0; 
            margin:auto; 
            padding:20px  ; 
            border:2px solid black;
            justify-content: left;
        }
        input{
            height: 30px ;
            padding:5px ; 

        }
        button{
            height : 40px ; 
            padding:5px ; 
        }
        select{
            height:30px ; 
        }
        .condition{
           display: flex ;
           flex-direction: row;
            
        }
       .condition input{
        height:fit-content;
       }
    </style>
</head>
<body>
    <form class="login">
        <input type="text"  name="userName" id="userName" placeholder="Name">
        <input type="email"  name="mail" id="mail" placeholder="Email">
        <input type="text" name="pass" id="pass" placeholder="Password">
        <input type="text" name="confirmPass" id="confirmPass" placeholder="Confirm Password">
        <select name="city" id="city">
            <option value> Select City</option>
            <option value="CityA">CityA</option>
            <option value="CityB">CityB</option>
            <option value="CityC">CityC</option>
            <option value="CityD">CityD</option>
            <option value="CityE">CityE</option>
            <option value="CityF">CityF</option>
        </select>
        <select name="state" id="state">
            <option value >Select State</option>
            <option value="StateA">StateA</option>
            <option value="StateB">StateB</option>
            <option value="StateC">StateC</option>
            <option value="StateD">StateD</option>
            <option value="StateE">StateE</option>
            <option value="StateF">StateF</option>
        </select>
        <div class="condition">
            <input  name="condition" id="condition" type="checkbox"><span>Terms &Condions</span>
        </div>
        <button id="register">REGISTER </button> 



    </form>
    <script>
        const adminName1="Deco1" ;
        const adminName2="Deco2";
        const adminName3="Deco3" ; 
        
       document.querySelector("form").addEventListener( 'submit' , (e) =>{
         alert( "form submitted") ; 
         e.preventDefault() ; 
         const formData = new FormData( e.target ) ; 
         const entry = {} ; 
         for( entries of formData ){
            const a = entries[0] ; 
            const b = entries[1] ; 
            entry[a]  = b ;

         }
         console.log( entry ) ; 
         const isChecked = document.querySelector("#condition").checked ; 

         if( !(entry.userName !== adminName1 || entry.userName !== adminName2 
         || entry.userName !== adminName3) ) {
            alert("Only Admin can register the app" )
            return ; 
         }

         if( localStorage.adminDetails ) {
            alert("One Admin ALready registered ") ; 
            return ;    
         }
          

         localStorage.setItem( "adminDetails"  , JSON.stringify(entry)) ;
         window.open("http://127.0.0.1:5500/Task/Dashbord.html" , "_blank");


       })

    </script>
</body>
</html>
